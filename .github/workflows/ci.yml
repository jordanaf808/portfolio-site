name: CI

# Quality gate only. Deployment is handled separately — either via Cloudflare
# Workers Builds (git-connected in the Cloudflare dashboard) or manually with
# `npx wrangler deploy`. This workflow does not deploy.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Astro validates the env vars declared in astro.config.mjs during the build.
      # We're not testing the contact form here, so real secrets aren't needed —
      # test values are enough. Cloudflare publishes "always pass" test keys for
      # Turnstile that work for both the site key and secret key below.
      RESEND_API_KEY: re_dummy_ci_value
      PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
